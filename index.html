
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.svg">
    
    <title>Elsa's English Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #F0F9FF;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        
        /* Snow Animation */
        .snowflakes {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
        }
        .snowflake {
            position: absolute; top: -10vh; color: #fff;
            font-size: 1.5em; text-shadow: 0 0 5px rgba(255,255,255,0.8);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; }
        }
        .snowflake:nth-child(1) { left: 10%; animation-duration: 10s; animation-delay: 0s; }
        .snowflake:nth-child(2) { left: 20%; animation-duration: 12s; animation-delay: 2s; font-size: 1.2em; }
        .snowflake:nth-child(3) { left: 30%; animation-duration: 8s; animation-delay: 4s; }
        .snowflake:nth-child(4) { left: 40%; animation-duration: 15s; animation-delay: 1s; font-size: 0.8em; }
        .snowflake:nth-child(5) { left: 50%; animation-duration: 11s; animation-delay: 3s; }
        .snowflake:nth-child(6) { left: 60%; animation-duration: 9s; animation-delay: 5s; font-size: 1.8em; }
        .snowflake:nth-child(7) { left: 70%; animation-duration: 14s; animation-delay: 2s; }
        .snowflake:nth-child(8) { left: 80%; animation-duration: 10s; animation-delay: 6s; font-size: 1.1em; }
        .snowflake:nth-child(9) { left: 90%; animation-duration: 13s; animation-delay: 1s; }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        /* Ice Glow Animation */
        @keyframes ice-glow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #7dd3fc, 0 0 20px #38bdf8; }
            50% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #7dd3fc, 0 0 40px #38bdf8; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #7dd3fc, 0 0 20px #38bdf8; }
        }
        .text-ice-glow {
            animation: ice-glow 3s ease-in-out infinite;
        }
        
        /* Sparkle Animation */
        @keyframes sparkle {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0.8; }
        }
        .animate-sparkle {
            animation: sparkle 4s linear infinite;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }

      // Capture PWA install prompt globally
      window.deferredPWAInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAInstallPrompt = e;
        // Dispatch a custom event so React can pick it up immediately if it's already mounted
        window.dispatchEvent(new Event('pwa-install-ready'));
      });
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
